services:
  api:
    image: ${GHCR_REG:-ghcr.io}/${GHCR_OWNER}/station-eden-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      API_PORT: ${API_PORT}
      API_CORS_ORIGIN: ${API_CORS_ORIGIN}
      COOKIE_SECURE: ${COOKIE_SECURE}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES}
      JWT_REFRESH_TTL_MS: ${JWT_REFRESH_TTL_MS}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      DATABASE_URL: ${DATABASE_URL}
      ENABLE_GOOGLE_LOGIN: ${ENABLE_GOOGLE_LOGIN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL}
      WEB_AFTER_LOGIN_URL: ${WEB_AFTER_LOGIN_URL}
      ENABLE_YANDEX_LOGIN: ${ENABLE_YANDEX_LOGIN}
      YANDEX_CLIENT_ID: ${YANDEX_CLIENT_ID}
      YANDEX_CLIENT_SECRET: ${YANDEX_CLIENT_SECRET}
      YANDEX_REDIRECT_URL: ${YANDEX_REDIRECT_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      CSRF_COOKIE_DOMAIN: ${CSRF_COOKIE_DOMAIN}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4000/auth/csrf",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks: [webnet]
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  web:
    image: ${GHCR_REG:-ghcr.io}/${GHCR_OWNER}/station-eden-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE: "https://api.stationeden.ru"
      NEXT_PUBLIC_WS_BASE: "wss://api.stationeden.ru"
      NEXT_PUBLIC_ENABLE_GOOGLE: "true"
      NEXT_PUBLIC_ENABLE_YANDEX: "true"
      NEXT_PUBLIC_ASSETS_BASE: "https://cdn.assets.stationeden.ru"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks: [webnet]
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  caddy:
    image: public.ecr.aws/docker/library/caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      PUBLIC_BASE_HOST: ${PUBLIC_BASE_HOST}
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks: [webnet]

  watchtower:
    image: ghcr.io/containrrr/watchtower:latest
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # обновляем только контейнеры с label enable=true
    command: --interval 30 --cleanup --label-enable

networks:
  webnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  caddy_data:
  caddy_config:
