name: Build & Push Images (GHCR)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Owner lowercase
        id: owner
        shell: bash
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker
          install: true

      # ===== API image =====
      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          cache-from: |
            type=registry,ref=ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-api:latest
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-api:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-api:${{ github.sha }}

      # ===== WEB image =====
      - name: Build & Push WEB
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ vars.NEXT_PUBLIC_API_BASE }}
            NEXT_PUBLIC_ENABLE_TELEGRAM=${{ vars.NEXT_PUBLIC_ENABLE_TELEGRAM }}
            NEXT_PUBLIC_ENABLE_GOOGLE=${{ vars.NEXT_PUBLIC_ENABLE_GOOGLE }}
            BUILDKIT_INLINE_CACHE=1
          cache-from: |
            type=registry,ref=ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-web:latest
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-web:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-web:${{ github.sha }}

      # ===== Deploy to server via SSH =====
      - name: Deploy to server
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail
            set -x

            cd ~/station-eden || { mkdir -p ~/station-eden && cd ~/station-eden; }
            if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              git fetch --all --prune
              git checkout main || true
              git reset --hard origin/main
            else
              echo "Not a git repo. Skipping pull (используется текущее содержимое каталога)."
            fi

            echo "==> Login to GHCR on server"
            set +x
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
            set -x

            echo "==> Load /etc/environment (server)"
            set +x
            set -a; [ -f /etc/environment ] && . /etc/environment || true; set +a
            set -x

            # ==== образы (namespace/registry/tag) ====
            export GHCR_OWNER="${{ steps.owner.outputs.lc }}"
            export GHCR_REG="ghcr.io"
            export IMAGE_TAG="${{ github.sha }}"
            [ -n "$IMAGE_TAG" ] || IMAGE_TAG="latest"

            # Выбираем compose CLI (всегда с --env-file /etc/environment)
            if docker-compose version >/dev/null 2>&1; then
              COMP="docker-compose --env-file /etc/environment -f docker-compose.yml"
            elif docker compose version >/dev/null 2>&1; then
              COMP="docker compose --env-file /etc/environment -f docker-compose.yml"
            else
              echo "Neither 'docker-compose' nor 'docker compose' found on the server."
              exit 1
            fi

            echo "==> Effective image refs (resolved by compose)"
            $COMP config | awk '/image:/{print}'

            echo "==> Sanity-check: GHCR manifests availability"
            docker manifest inspect "${GHCR_REG}/${GHCR_OWNER}/station-eden-api:${IMAGE_TAG}" >/dev/null 2>&1 || true
            docker manifest inspect "${GHCR_REG}/${GHCR_OWNER}/station-eden-web:${IMAGE_TAG}"  >/dev/null 2>&1 || true

            echo "==> Pull images"
            if ! $COMP pull; then
              echo "First pull failed. Fallback to IMAGE_TAG=latest ..."
              export IMAGE_TAG="latest"
              $COMP config | awk '/image:/{print}'
              $COMP pull
            fi

            echo "==> Up containers"
            $COMP up -d --force-recreate

            echo "==> Run DB migrations"
            API_CID=$($COMP ps -q api || true)
            if [ -n "${API_CID:-}" ]; then
              docker exec -i "$API_CID" \
                node ./node_modules/typeorm/cli.js migration:run -d dist/db/data-source.js
            else
              echo "API container not found (compose service name 'api'). Skipping migrations."
            fi

            echo "==> Status"
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
