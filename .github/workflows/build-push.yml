name: Build & Push Images (GHCR)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Owner lowercase
        id: owner
        shell: bash
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # ===== API image =====
      - name: Build & Push API (latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          cache-from: |
            type=registry,ref=ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-api:latest
          cache-to: |
            type=inline
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-api:latest

      - name: Tag API digest as commit SHA (no re-push)
        shell: bash
        run: |
          set -euo pipefail

          OWNER="${{ steps.owner.outputs.lc }}"
          SRC="ghcr.io/${OWNER}/station-eden-api:latest"
          DST="ghcr.io/${OWNER}/station-eden-api:${{ github.sha }}"

          echo "Creating tag ${DST} -> ${SRC}"

          for i in 1 2 3 4 5 6; do
            if docker buildx imagetools create -t "${DST}" "${SRC}"; then
              echo "API SHA tag created"
              exit 0
            fi

            echo "API SHA tag failed. Retry ${i}/6..."
            sleep $((i * 5))
          done

          echo "Failed to create API SHA tag after retries"
          exit 1

      # ===== WEB image =====
      - name: Build & Push WEB (latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          build-args: |
            NEXT_PUBLIC_API_BASE=https://api.stationeden.ru
            NEXT_PUBLIC_WS_BASE=wss://api.stationeden.ru
            NEXT_PUBLIC_ENABLE_VK=true
            NEXT_PUBLIC_VK_CLIENT_ID=54630306
            NEXT_PUBLIC_VK_REDIRECT_URL=https://api.stationeden.ru/auth/vk/callback
            NEXT_PUBLIC_ENABLE_YANDEX=true
            BUILDKIT_INLINE_CACHE=1
          cache-from: |
            type=registry,ref=ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-web:latest
          cache-to: |
            type=inline
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-web:latest

      - name: Tag WEB digest as commit SHA (no re-push)
        shell: bash
        run: |
          set -euo pipefail

          OWNER="${{ steps.owner.outputs.lc }}"
          SRC="ghcr.io/${OWNER}/station-eden-web:latest"
          DST="ghcr.io/${OWNER}/station-eden-web:${{ github.sha }}"

          echo "Creating tag ${DST} -> ${SRC}"

          for i in 1 2 3 4 5 6; do
            if docker buildx imagetools create -t "${DST}" "${SRC}"; then
              echo "WEB SHA tag created"
              exit 0
            fi

            echo "WEB SHA tag failed. Retry ${i}/6..."
            sleep $((i * 5))
          done

          echo "Failed to create WEB SHA tag after retries"
          exit 1

      # ===== Deploy to server via SSH =====
      - name: Deploy to server
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -euo pipefail

          echo "==> Install sshpass"
          for i in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y sshpass; then
              echo "sshpass installed"
              break
            fi

            echo "sshpass install failed. Retry ${i}/3..."
            sleep $((i * 5))

            if [ "$i" = "3" ]; then
              echo "Failed to install sshpass"
              exit 1
            fi
          done

          echo "==> Connect to server"
          sshpass -e ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=20 \
            -o ConnectionAttempts=3 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" 'bash -s' << 'REMOTE_SCRIPT'
              set -euo pipefail
              set -x

              APP_DIR="$HOME/station-eden"
              MIN_FREE_MB=1024
              CRITICAL_FREE_MB=512

              free_space_mb() {
                df -Pm / | awk 'NR==2 {print $4}'
              }

              print_disk_info() {
                echo "==> Disk usage"
                df -h /

                echo "==> Docker usage"
                docker system df || true
              }

              cleanup_safe() {
                echo "==> Safe cleanup"
                echo "==> Removing stopped containers, old unused images, old build cache, unused networks and old logs"

                docker container prune -f || true
                docker image prune -af --filter "until=24h" || true
                docker builder prune -af --filter "until=24h" || true
                docker network prune -f || true

                sudo apt-get clean || true
                sudo journalctl --vacuum-time=3d || true

                sudo find /tmp -mindepth 1 -mtime +1 -delete 2>/dev/null || true
                sudo find /var/tmp -mindepth 1 -mtime +1 -delete 2>/dev/null || true
              }

              cleanup_aggressive() {
                echo "==> Aggressive cleanup"
                echo "==> Removing all unused Docker containers, images, build cache and networks"
                echo "==> Docker volumes are NOT removed"

                docker container prune -f || true
                docker image prune -af || true
                docker builder prune -af || true
                docker network prune -f || true

                sudo apt-get clean || true
                sudo journalctl --vacuum-time=2d || true

                sudo find /tmp -mindepth 1 -mtime +1 -delete 2>/dev/null || true
                sudo find /var/tmp -mindepth 1 -mtime +1 -delete 2>/dev/null || true
              }

              ensure_min_free_space() {
                FREE_MB="$(free_space_mb)"
                FREE_MB="${FREE_MB:-0}"

                echo "==> Free space: ${FREE_MB} MB"

                if [ "$FREE_MB" -lt "$MIN_FREE_MB" ]; then
                  echo "==> Free space is below ${MIN_FREE_MB} MB. Running aggressive cleanup..."
                  cleanup_aggressive
                  print_disk_info

                  FREE_MB="$(free_space_mb)"
                  FREE_MB="${FREE_MB:-0}"

                  if [ "$FREE_MB" -lt "$CRITICAL_FREE_MB" ]; then
                    echo "Not enough free disk space after cleanup: ${FREE_MB} MB"
                    echo "The server disk is too small or contains large non-Docker files."
                    echo "Increase disk size or remove large files manually."
                    exit 1
                  fi
                fi
              }

              login_ghcr() {
                echo "==> Login to GHCR on server"

                set +x
                LOGIN_OK=0

                for i in 1 2 3 4 5 6; do
                  if printf '%s' "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin; then
                    LOGIN_OK=1
                    break
                  fi

                  echo "GHCR login failed. Retry ${i}/6..."
                  sleep $((i * 10))
                done

                set -x

                if [ "$LOGIN_OK" -ne 1 ]; then
                  echo "GHCR login failed after retries"
                  return 1
                fi

                echo "GHCR login OK"
                return 0
              }

              update_repository() {
                if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
                  echo "==> Update repository"

                  FETCH_OK=0

                  for i in 1 2 3; do
                    if git fetch origin main --prune; then
                      FETCH_OK=1
                      break
                    fi

                    echo "git fetch failed. Retry ${i}/3..."
                    sleep $((i * 5))
                  done

                  if [ "$FETCH_OK" -ne 1 ]; then
                    echo "git fetch failed after retries"
                    exit 1
                  fi

                  git checkout -B main origin/main
                  git reset --hard origin/main
                else
                  echo "Not a git repo. Skipping pull."
                fi
              }

              detect_compose() {
                if [ -f .env ]; then
                  ENV_FILE_ARGS="--env-file .env"
                else
                  ENV_FILE_ARGS=""
                fi

                if docker compose version >/dev/null 2>&1; then
                  COMP="docker compose ${ENV_FILE_ARGS} -f docker-compose.yml"
                elif docker-compose version >/dev/null 2>&1; then
                  COMP="docker-compose ${ENV_FILE_ARGS} -f docker-compose.yml"
                else
                  echo "Neither 'docker compose' nor 'docker-compose' found."
                  exit 1
                fi

                echo "==> Compose command: ${COMP}"
              }

              compose_pull_with_retry() {
                LABEL="$1"
                ATTEMPTS="${2:-3}"

                for i in $(seq 1 "$ATTEMPTS"); do
                  echo "==> Pull images (${LABEL}), attempt ${i}/${ATTEMPTS}"

                  if $COMP pull; then
                    echo "Pull images OK (${LABEL})"
                    return 0
                  fi

                  echo "Pull images failed (${LABEL}), attempt ${i}/${ATTEMPTS}"

                  cleanup_safe || true
                  print_disk_info || true
                  ensure_min_free_space || true
                  login_ghcr || true

                  sleep $((i * 10))
                done

                return 1
              }

              mkdir -p "$APP_DIR"
              cd "$APP_DIR"

              update_repository
              detect_compose
              ensure_min_free_space
              login_ghcr
              compose_pull_with_retry "initial" 3

              echo "==> Start containers"
              $COMP up -d --remove-orphans

              echo "==> Done"
          REMOTE_SCRIPT
