name: Build & Push Images (GHCR)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Owner lowercase
        id: owner
        shell: bash
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      # ===== API image =====
      - name: Build & Push API (latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          cache-from: |
            type=registry,ref=ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-api:latest
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-api:latest

      - name: Tag API digest as commit SHA (no re-push)
        shell: bash
        run: |
          set -euo pipefail

          OWNER="${{ steps.owner.outputs.lc }}"
          SRC="ghcr.io/${OWNER}/station-eden-api:latest"
          DST="ghcr.io/${OWNER}/station-eden-api:${{ github.sha }}"

          echo "Creating tag ${DST} -> ${SRC}"

          for i in 1 2 3 4 5; do
            if docker buildx imagetools create -t "${DST}" "${SRC}"; then
              echo "OK"
              exit 0
            fi

            echo "Retry $i failed, sleeping..."
            sleep $((i * 2))
          done

          echo "Failed to create tag after retries"
          exit 1

      # ===== WEB image =====
      - name: Build & Push WEB (latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ vars.NEXT_PUBLIC_API_BASE }}
            NEXT_PUBLIC_ENABLE_GOOGLE=${{ vars.NEXT_PUBLIC_ENABLE_GOOGLE }}
            BUILDKIT_INLINE_CACHE=1
          cache-from: |
            type=registry,ref=ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-web:latest
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-web:latest

      - name: Tag WEB digest as commit SHA (no re-push)
        shell: bash
        run: |
          set -euo pipefail

          OWNER="${{ steps.owner.outputs.lc }}"
          SRC="ghcr.io/${OWNER}/station-eden-web:latest"
          DST="ghcr.io/${OWNER}/station-eden-web:${{ github.sha }}"

          echo "Creating tag ${DST} -> ${SRC}"

          for i in 1 2 3 4 5; do
            if docker buildx imagetools create -t "${DST}" "${SRC}"; then
              echo "OK"
              exit 0
            fi

            echo "Retry $i failed, sleeping..."
            sleep $((i * 2))
          done

          echo "Failed to create tag after retries"
          exit 1

      # ===== Deploy to server via SSH =====
      - name: Deploy to server
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail
            set -x

            APP_DIR="$HOME/station-eden"
            MIN_FREE_MB=1024
            CRITICAL_FREE_MB=512

            free_space_mb() {
              df -Pm / | awk 'NR==2 {print $4}'
            }

            print_disk_info() {
              echo "==> Disk usage"
              df -h /

              echo "==> Docker usage"
              docker system df || true
            }

            cleanup_safe() {
              echo "==> Safe cleanup"
              echo "==> Removing stopped containers, old unused images, old build cache, unused networks and old logs"

              docker container prune -f || true
              docker image prune -af --filter "until=24h" || true
              docker builder prune -af --filter "until=24h" || true
              docker network prune -f || true

              sudo apt-get clean || true
              sudo journalctl --vacuum-time=3d || true

              sudo find /tmp -mindepth 1 -mtime +1 -delete 2>/dev/null || true
              sudo find /var/tmp -mindepth 1 -mtime +1 -delete 2>/dev/null || true
            }

            cleanup_aggressive() {
              echo "==> Aggressive cleanup"
              echo "==> Removing all unused Docker containers, images, build cache and networks"
              echo "==> Docker volumes are NOT removed"

              docker container prune -f || true
              docker image prune -af || true
              docker builder prune -af || true
              docker network prune -f || true

              sudo apt-get clean || true
              sudo journalctl --vacuum-time=2d || true

              sudo find /tmp -mindepth 1 -mtime +1 -delete 2>/dev/null || true
              sudo find /var/tmp -mindepth 1 -mtime +1 -delete 2>/dev/null || true
            }

            ensure_min_free_space() {
              FREE_MB="$(free_space_mb)"
              FREE_MB="${FREE_MB:-0}"

              echo "==> Free space: ${FREE_MB} MB"

              if [ "$FREE_MB" -lt "$MIN_FREE_MB" ]; then
                echo "==> Free space is below ${MIN_FREE_MB} MB. Running aggressive cleanup..."
                cleanup_aggressive
                print_disk_info

                FREE_MB="$(free_space_mb)"
                FREE_MB="${FREE_MB:-0}"

                if [ "$FREE_MB" -lt "$CRITICAL_FREE_MB" ]; then
                  echo "Not enough free disk space after cleanup: ${FREE_MB} MB"
                  echo "The server disk is too small or contains large non-Docker files."
                  echo "Increase disk size or remove large files manually."
                  exit 1
                fi
              fi
            }

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            echo "==> Initial disk state"
            print_disk_info

            echo "==> Pre-deploy cleanup"
            cleanup_safe
            print_disk_info

            if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              echo "==> Update repository"
              git fetch --all --prune
              git checkout main || true
              git reset --hard origin/main
            else
              echo "Not a git repo. Skipping pull."
            fi

            echo "==> Login to GHCR on server"
            set +x
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
            set -x

            echo "==> Load .env file"
            set +x
            set -a
            [ -f .env ] && source .env
            set +a
            set -x

            export GHCR_OWNER="${{ steps.owner.outputs.lc }}"
            export GHCR_REG="ghcr.io"
            export IMAGE_TAG="${{ github.sha }}"
            [ -n "$IMAGE_TAG" ] || IMAGE_TAG="latest"

            if docker-compose version >/dev/null 2>&1; then
              COMP="docker-compose --env-file .env -f docker-compose.yml"
            elif docker compose version >/dev/null 2>&1; then
              COMP="docker compose --env-file .env -f docker-compose.yml"
            else
              echo "Neither 'docker-compose' nor 'docker compose' found."
              exit 1
            fi

            echo "==> Check free space before pulling images"
            ensure_min_free_space

            echo "==> Pull images"
            if ! $COMP pull; then
              echo "First pull failed. Running aggressive cleanup and retrying..."
              cleanup_aggressive
              print_disk_info
              ensure_min_free_space

              if ! $COMP pull; then
                echo "Second pull failed. Trying maintenance fallback with compose down..."
                echo "==> This may cause a short downtime, but helps free old images on small disks."

                $COMP down --remove-orphans || true

                cleanup_aggressive
                print_disk_info
                ensure_min_free_space

                if ! $COMP pull; then
                  echo "Commit SHA pull failed. Fallback to latest..."
                  export IMAGE_TAG="latest"
                  $COMP pull
                fi
              fi
            fi

            echo "==> Up containers"
            $COMP up -d --force-recreate --remove-orphans

            echo "==> Final cleanup after successful deploy"
            docker container prune -f || true
            docker image prune -af --filter "until=24h" || true
            docker builder prune -af --filter "until=24h" || true
            docker network prune -f || true

            echo "==> Final disk state"
            print_disk_info

            echo "==> Status"
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
