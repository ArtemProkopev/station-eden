name: Build & Push Images (GHCR)

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # приведение owner к нижнему регистру (для ghcr тегов)
      - name: Owner lowercase
        id: owner
        shell: bash
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (build)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # ===== API image =====
      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-api:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ===== WEB image (все публичные env как build-args) =====
      - name: Build & Push WEB
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-web:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ vars.NEXT_PUBLIC_API_BASE }}
            NEXT_PUBLIC_ENABLE_TELEGRAM=${{ vars.NEXT_PUBLIC_ENABLE_TELEGRAM }}
            NEXT_PUBLIC_ENABLE_GOOGLE=${{ vars.NEXT_PUBLIC_ENABLE_GOOGLE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ===== Deploy to server via SSH =====
      - name: Deploy to server
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          script: |
            set -e
            cd ~/station-eden

            # Логин на GHCR со стороны сервера (образы приватные)
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            # Подтягиваем /etc/environment в текущую сессию,
            # чтобы docker-compose увидел ${VARS} из compose-файла
            set -a
            . /etc/environment
            set +a

            # Обновляем образы и пересоздаем контейнеры
            docker-compose pull
            docker-compose up -d --force-recreate

            # Немного статуса
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
