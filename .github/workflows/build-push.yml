name: Build & Push Images (GHCR)

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # нужно для GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (optional, если нужны multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # API
      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/station-eden-api:latest
            ghcr.io/${{ github.repository_owner }}/station-eden-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # WEB (с публичными build-args)
      - name: Build & Push WEB
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/station-eden-web:latest
            ghcr.io/${{ github.repository_owner }}/station-eden-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ vars.NEXT_PUBLIC_API_BASE }}
            NEXT_PUBLIC_ENABLE_TELEGRAM=${{ vars.NEXT_PUBLIC_ENABLE_TELEGRAM }}
            NEXT_PUBLIC_ENABLE_GOOGLE=${{ vars.NEXT_PUBLIC_ENABLE_GOOGLE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
