name: Build & Push Images (GHCR)

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Owner lowercase
        id: owner
        shell: bash
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (build)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # ===== API image =====
      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-api:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      # ===== WEB image =====
      - name: Build & Push WEB
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-web:latest
            ghcr.io/${{ steps.owner.outputs.lc }}/station-eden-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ vars.NEXT_PUBLIC_API_BASE }}
            NEXT_PUBLIC_ENABLE_TELEGRAM=${{ vars.NEXT_PUBLIC_ENABLE_TELEGRAM }}
            NEXT_PUBLIC_ENABLE_GOOGLE=${{ vars.NEXT_PUBLIC_ENABLE_GOOGLE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      # ===== Deploy to server via SSH =====
      - name: Deploy to server
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          script: |
            set -euo pipefail
            set -x
            cd ~/station-eden

            echo "==> Login to GHCR on server"
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            echo "==> Load /etc/environment (server)"
            set -a; [ -f /etc/environment ] && . /etc/environment || true; set +a

            # ==== образа (namespace/registry/tag) ====
            export GHCR_OWNER="${{ steps.owner.outputs.lc }}"
            export GHCR_REG="ghcr.io"
            export IMAGE_TAG="${{ github.sha }}"
            [ -n "$IMAGE_TAG" ] || IMAGE_TAG="latest"

            # Выбираем compose CLI
            if docker compose version >/dev/null 2>&1; then
              COMP="docker compose -f docker-compose.yml"
            else
              COMP="docker-compose -f docker-compose.yml"
            fi

            echo "==> Effective image refs (resolved by compose)"
            $COMP config | awk '/image:/{print}'

            echo "==> Sanity-check: GHCR manifests availability"
            set +e
            docker manifest inspect ${GHCR_REG}/${GHCR_OWNER}/station-eden-api:${IMAGE_TAG} >/dev/null
            API_HAS_TAG=$?
            docker manifest inspect ${GHCR_REG}/${GHCR_OWNER}/station-eden-web:${IMAGE_TAG} >/dev/null
            WEB_HAS_TAG=$?
            set -e
            if [ $API_HAS_TAG -ne 0 ] || [ $WEB_HAS_TAG -ne 0 ]; then
              echo "Tag ${IMAGE_TAG} not found for at least one image. Will fallback to 'latest' if pull fails."
            fi

            echo "==> Pull images"
            if ! $COMP pull --no-parallel; then
              echo "First pull failed. Fallback to IMAGE_TAG=latest ..."
              export IMAGE_TAG="latest"
              $COMP config | awk '/image:/{print}'
              $COMP pull --no-parallel
            fi

            echo "==> Up containers"
            $COMP up -d --force-recreate

            echo "==> Status"
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
